<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Authentication | HowTo?</title>
    <!-- Importing Google Fonts for that "Notebook" feel -->
    <link
      href="https://fonts.googleapis.com/css2?family=Indie+Flower&family=Quicksand:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/x-icon" href="./logo.png">

    <style>
      :root {
        /* Color Palette */
        --page-scale: 1.25;
        --gold-primary: #9f7528;
        --gold-light: #ead7b0;
        --gold-hover: #6e5018;
        --gold-dark: #6e5018;
        --paper-white: #ffffff;
        --ink-color: #2c2c2c;
        --line-color: rgba(229, 229, 224, 0.9);
        --margin-line: rgba(197, 160, 89, 0.35);
        --bg-gray: #f4f4f2;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Quicksand", sans-serif;
        background-color: var(--bg-gray);
        /* Crumpled paper texture overlay */
        background-image: url("https://www.transparenttextures.com/patterns/p6.png");
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        color: var(--ink-color);
        overflow: hidden;
        position: relative;
      }

      /* Gold Stars in the background */
      .star {
        position: absolute;
        color: var(--gold-primary);
        opacity: 0.5;
        pointer-events: none;
        z-index: 0;
        animation: twinkle 4s infinite ease-in-out;
      }

      @keyframes twinkle {
        0%,
        100% {
          opacity: 0.2;
          transform: scale(1) rotate(0deg);
        }
        50% {
          opacity: 0.7;
          transform: scale(1.3) rotate(15deg);
        }
      }

      /* The Main Notebook Card */
      .notebook-card {
        background-color: var(--paper-white);
        width: 90%;
        max-width: 480px;
        min-height: 550px;
        position: relative;
        z-index: 1;
        box-shadow:
          0 10px 30px rgba(0, 0, 0, 0.05),
          0 1px 1px rgba(0, 0, 0, 0.1),
          inset 0 0 100px rgba(197, 160, 89, 0.03);
        border-radius: 4px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        animation: slideIn 0.8s ease-out;
        border: 1px solid #e5e5e0;
        zoom: var(--page-scale);
      }

      @media (min-width: 768px) {
        .notebook-card {
          max-width: 540px;
        }
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* The Gold "Binding" at the top */
      .binding-top {
        height: 15px;
        background: repeating-linear-gradient(
          45deg,
          var(--gold-dark),
          var(--gold-dark) 10px,
          var(--gold-primary) 10px,
          var(--gold-primary) 20px
        );
        width: 100%;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        z-index: 2;
      }

      /* The Notebook Content Area with HIGHLY SCRIBBLED Lines */
      .paper-content {
        padding: 40px 40px 60px 50px;
        position: relative;
        flex-grow: 1;
        /* New Scribbled SVG: multiple segments for a rougher, more human look */
        background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='40'><path d='M0 38 L 40 37 L 80 39 L 120 37.5 L 160 38.5 L 200 38' stroke='rgba(180, 180, 180, 0.6)' fill='none' stroke-width='1.2'/></svg>");
        background-size: 100% 2.5rem;
        background-position: 0 1.5rem;
      }

      /* Scribbled Margin Line */
      .paper-content::before {
        content: "";
        position: absolute;
        top: 0;
        bottom: 0;
        left: 35px;
        width: 3px;
        /* Jittery vertical line */
        background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='3' height='100'><path d='M1.5 0 L 2.5 25 L 1 50 L 2 75 L 1.5 100' stroke='rgba(197, 160, 89, 0.35)' fill='none' stroke-width='2'/></svg>");
        background-size: 3px 100px;
        height: 100%;
      }

      /* Header Styling */
      .header-section {
        text-align: center;
        margin-bottom: 2rem;
        position: relative;
      }

      h1 {
        font-family: "Indie Flower", cursive;
        font-size: 2.8rem;
        color: var(--gold-primary);
        font-weight: bold;
        text-shadow: 1px 1px 0px rgba(0, 0, 0, 0.05);
        margin-bottom: 5px;
        line-height: 1.2;
      }

      .subtitle {
        font-size: 0.9rem;
        color: #888;
        font-style: italic;
        background-color: var(--paper-white);
        display: inline-block;
        padding: 0 10px;
      }

      /* Tab Switching */
      .tabs {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-bottom: 30px;
      }

      .tab-btn {
        background: none;
        border: none;
        font-family: "Indie Flower", cursive;
        font-size: 1.4rem;
        cursor: pointer;
        color: #ccc;
        padding-bottom: 5px;
        transition: 0.3s;
        position: relative;
      }

      .tab-btn.active {
        color: var(--gold-primary);
        font-weight: bold;
        transform: scale(1.1);
      }

      .tab-btn.active::after {
        content: "";
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 10px;
        /* Messier highlighter stroke */
        background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='10'><path d='M2 6 C 20 4, 80 8, 98 5' stroke='rgba(243, 229, 171, 0.9)' fill='none' stroke-width='8' stroke-linecap='round'/></svg>");
        background-repeat: no-repeat;
        z-index: -1;
        transform: translateY(-2px);
      }

      /* Loader (small spinner) */
      .loader {
        border: 3px solid rgba(0, 0, 0, 0.08);
        border-top: 3px solid var(--gold-primary);
        border-radius: 50%;
        width: 18px;
        height: 18px;
        animation: spin 1s linear infinite;
        display: inline-block;
      }
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      /* Inline error message */
      .error-msg {
        /* match form input aesthetic */
        color: #b91c1c;
        background: transparent;
        border: none;
        padding: 6px 0 10px 0;
        margin-top: 12px;
        font-size: 1rem;
        font-family: "Indie Flower", cursive;
        position: relative;
        z-index: 2;
      }

      .error-msg::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 4px;
        background-repeat: no-repeat;
        pointer-events: none;
        opacity: 0.95;
      }

      /* Form Inputs */
      .input-group {
        margin-bottom: 1.5rem;
        position: relative;
        display: flex;
        align-items: center;
      }

      input {
        width: 100%;
        background: transparent;
        border: none;
        /* Ensure the underline is always visible and scribbled */
        border-bottom: 2px solid transparent;
        font-family: "Indie Flower", cursive;
        font-size: 1.1rem;
        color: var(--ink-color);
        padding: 5px 0;
        outline: none;
        position: relative;
        z-index: 2;
      }

      /* Permanent Scribbled Gold Underline */
      .input-group::after {
        content: "";
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 4px;
        background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='4'><path d='M0 2 L 20 1 L 40 3 L 60 1.5 L 80 2.5 L 100 2' stroke='%23D4AF37' fill='none' stroke-width='2' stroke-linecap='round'/></svg>");
        background-size: 100% 4px;
        background-repeat: no-repeat;
        pointer-events: none;
        opacity: 0.8;
        transition: opacity 0.3s;
      }

      /* Subtle focus effect on the line */
      input:focus + button + .input-group::after,
      input:focus ~ .input-group::after {
        opacity: 1;
      }

      input::placeholder {
        font-family: "Indie Flower", cursive;
        color: #bbb;
        font-size: 1.2rem;
      }

      /* Password Toggle Button */
      .toggle-password {
        background: none;
        border: none;
        color: var(--gold-primary);
        cursor: pointer;
        font-family: "Indie Flower", cursive;
        font-size: 1.2rem;
        padding: 0 5px;
        position: absolute;
        right: 0;
        bottom: 5px;
        user-select: none;
        transition: opacity 0.2s;
        z-index: 3;
      }

      .toggle-password:hover {
        opacity: 0.7;
      }

      /* Action Button */
      .action-btn {
        width: 100%;
        margin-top: 20px;
        background: var(--ink-color);
        color: white;
        border: 1px solid var(--ink-color);
        padding: 12px;
        font-family: "Quicksand", sans-serif;
        font-weight: 700;
        font-size: 1.1rem;
        border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px;
        cursor: pointer;
        box-shadow: 2px 4px 0px #6f5526;
        transition: all 0.3s ease;
        text-transform: lowercase;
        letter-spacing: 1px;
      }

      .action-btn:hover {
        background: var(--gold-primary);
        border-color: var(--gold-primary);
        transform: translateY(-2px);
        box-shadow: 2px 6px 0px #6f5526;
      }

      .form-container {
        display: none;
        animation: fadeIn 0.5s ease;
      }

      .form-container.active {
        display: block;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .footer {
        margin-top: 30px;
        text-align: center;
        font-size: 0.85rem;
      }

      .footer a {
        color: var(--gold-primary);
        text-decoration: none;
        font-weight: bold;
      }

      .doodle {
        position: absolute;
        font-family: "Indie Flower", cursive;
        color: var(--gold-primary);
        opacity: 0.3;
        font-size: 1.5rem;
        pointer-events: none;
        transform: rotate(-15deg);
      }

      .doodle.top-right {
        top: 25px;
        right: 25px;
      }
      .doodle.bottom-left {
        bottom: 25px;
        left: 15px;
        transform: rotate(10deg);
        font-size: 1rem;
      }

      .hidden {
        display: none !important;
      }

      .animate-fade-in {
        animation: fadeIn 0.5s ease;
      }

      .text-center {
        text-align: center;
      }

      .space-y-4 > * + * {
        margin-top: 1rem;
      }

      .inline-block {
        display: inline-block;
      }

      .mb-4 {
        margin-bottom: 1rem;
      }

      .mb-8 {
        margin-bottom: 2rem;
      }

      .dashboard-avatar {
        position: relative;
        display: inline-flex;
        width: 96px;
        height: 96px;
        margin-bottom: 1rem;
      }

      .dashboard-avatar-image {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: cover;
        object-position: center;
        border-radius: 9999px;
        border: 4px solid #ffffff;
        box-shadow: 0 12px 24px rgba(0, 0, 0, 0.12);
      }

      .dashboard-avatar-status {
        position: absolute;
        right: 4px;
        bottom: 4px;
        width: 18px;
        height: 18px;
        background: #22c55e;
        border: 3px solid #ffffff;
        border-radius: 9999px;
      }

      #dashboard-view {
        width: 100%;
        display: flex;
        justify-content: center;
      }

      .dashboard-link-btn,
      .dashboard-logout-btn {
        display: inline-block;
        padding: 0.5rem 1.5rem;
        text-decoration: none;
        font-family: "Inter", sans-serif;
        font-weight: 600;
        font-size: 0.875rem;
        border-radius: 2px;
        transition: all 0.3s ease;
      }

      .dashboard-link-btn {
        background-color: var(--ink-color);
        color: var(--paper-white) !important;
        border: 1px solid var(--ink-color);
      }

      .dashboard-link-btn:hover {
        background-color: var(--gold-primary);
        border-color: var(--gold-primary);
        transform: translateY(-2px);
      }

      .dashboard-logout-btn {
        background-color: transparent;
        color: var(--ink-color);
        border: 1px solid var(--gold-light);
        cursor: pointer;
      }

      .dashboard-logout-btn:hover {
        background-color: var(--gold-light);
        border-color: var(--gold-light);
        transform: translateY(-2px);
      }
    </style>
  </head>
  <body>
    <div id="star-container"></div>

    <div id="auth-container" class="notebook-card">
      <div class="binding-top"></div>

      <div class="paper-content">
        <div class="doodle top-right">✎</div>
        <div class="doodle bottom-left">find your solutions here</div>

        <div class="header-section">
          <h1>HowTo?</h1>
          <span class="subtitle"><i>your tips to everything</i></span>
        </div>

        <div class="tabs">
          <button
            class="tab-btn active"
            id="login-tab"
            onclick="toggleForm('login')"
          >
            Log In
          </button>
          <button
            class="tab-btn"
            id="signup-tab"
            onclick="toggleForm('signup')"
          >
            Sign Up
          </button>
        </div>
        <!-- Google Login Button (shared) -->
        <div
          style="display: flex; justify-content: center; margin-bottom: 1rem"
        >
          <button
            id="google-login-btn"
            style="
              display: flex;
              align-items: center;
              gap: 8px;
              padding: 8px 12px;
              border-radius: 8px;
              border: 1px solid #e5e7eb;
              background: #fff;
              cursor: pointer;
            "
          >
            <img
              src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"
              style="width: 20px; height: 20px"
              alt="Google"
            />
            <span style="font-weight: 700">Continue with Google</span>
          </button>
        </div>

        <!-- Login Form -->
        <div id="login-form" class="form-container active">
          <form onsubmit="event.preventDefault()">
            <div class="input-group">
              <input
                id="login-email"
                type="email"
                placeholder="email"
                required
              />
            </div>
            <div class="input-group">
              <input
                type="password"
                id="login-password"
                placeholder="passcode"
                required
              />
              <button
                type="button"
                class="toggle-password"
                onclick="togglePassword('login-password', this)"
              >
                👁
              </button>
            </div>
            <button id="login-btn" type="submit" class="action-btn">
              <span id="login-btn-text">log in</span>
              <span
                id="login-btn-loader"
                class="loader"
                style="
                  display: none;
                  margin-left: 8px;
                  width: 18px;
                  height: 18px;
                  border-width: 3px;
                "
              ></span>
            </button>

            <div id="login-error" class="error-msg" style="display:none;" aria-live="polite"></div>

            <div class="footer">
              <p>forgot your password? <a href="#">reset</a></p>
            </div>
          </form>
        </div>

        <!-- Signup Form -->
        <div id="signup-form" class="form-container">
          <form onsubmit="event.preventDefault()">
            <div class="input-group">
              <input
                id="signup-name"
                type="text"
                placeholder="username"
                required
              />
            </div>
            <div class="input-group">
              <input
                id="signup-email"
                type="email"
                placeholder="preferred email"
                required
              />
            </div>
            <div class="input-group">
              <input
                type="password"
                id="signup-password"
                placeholder="new password"
                required
              />
              <button
                type="button"
                class="toggle-password"
                onclick="togglePassword('signup-password', this)"
              >
                👁
              </button>
            </div>
            <button id="signup-btn" type="submit" class="action-btn">
              <span id="signup-btn-text">sign up</span>
              <span
                id="signup-btn-loader"
                class="loader"
                style="
                  display: none;
                  margin-left: 8px;
                  width: 18px;
                  height: 18px;
                  border-width: 3px;
                "
              ></span>
            </button>

            <div id="signup-error" class="error-msg" style="display:none;" aria-live="polite"></div>

            <div class="footer">
              <p>
                already have an account?
                <a href="#" onclick="toggleForm('login')">login</a>
              </p>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- Dashboard View (shown when logged in) -->
    <div id="dashboard-view" class="hidden">
      <div class="notebook-card">
        <div class="binding-top"></div>
        <div class="paper-content">
          <div class="doodle top-right">✎</div>
          <div class="doodle bottom-left">logged in</div>

          <div class="header-section">
            <h1>Welcome!</h1>
            <span class="subtitle"><i>your profile</i></span>
          </div>

          <div class="text-center space-y-4">
            <div class="dashboard-avatar">
              <img
                id="user-photo"
                src=""
                alt="User avatar"
                class="dashboard-avatar-image"
              />
              <div class="dashboard-avatar-status"></div>
            </div>
            <div>
              <h2 class="text-xl font-bold text-gray-800" id="user-name"></h2>
            </div>

            <div class="footer" style="margin-top: 40px;">
              <a
                href="home.html"
                onclick="redirectToHome()"
                class="dashboard-link-btn mb-4"
              >
                ← Back to Home
              </a>
              <p>
                <button
                  id="logout-btn-dashboard"
                  class="dashboard-logout-btn"
                >
                  Log Out
                </button>
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script type="module">
      import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
      import {
        getAuth,
        GoogleAuthProvider,
        signInWithPopup,
        signInWithEmailAndPassword,
        createUserWithEmailAndPassword,
        updateProfile,
        signOut,
        onAuthStateChanged,
      } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
      import {getFirestore, setDoc, doc} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

      // Sử dụng cấu hình từ dự án của bạn
      const firebaseConfig = {
        apiKey: "AIzaSyCheSKMoXuUCQPzzKnkzj1NHMG8YXqIChY",
        authDomain: "howto-d45bc.firebaseapp.com",
        projectId: "howto-d45bc",
        storageBucket: "howto-d45bc.firebasestorage.app",
        messagingSenderId: "929511966384",
        appId: "1:929511966384:web:3fe35c2267f4dbe779dd75",
        measurementId: "G-9EXDTY4GB8",
      };

      let app;
      if (getApps().length === 0) {
        app = initializeApp(firebaseConfig);
      } else {
        app = getApps()[0];
      }
      const auth = getAuth(app);
      const db = getFirestore(app);
      const provider = new GoogleAuthProvider();
      const ADMIN_UIDS = new Set(["JDWQ2UczIoWlBefyZQXeUVsd3lD2"]);

      function getAdminSeed(user) {
        return ADMIN_UIDS.has(user?.uid || "") ? { isAdmin: true } : {};
      }

      // DOM refs for views and forms
      const loginView = document.getElementById("auth-container");
      const dashboardView = document.getElementById("dashboard-view");

      const loginBtn = document.getElementById("login-btn");
      const loginBtnText = document.getElementById("login-btn-text");
      const loginLoader = document.getElementById("login-btn-loader");

      const signupBtn = document.getElementById("signup-btn");
      const signupBtnText = document.getElementById("signup-btn-text");
      const signupLoader = document.getElementById("signup-btn-loader");

      const googleBtn = document.getElementById("google-login-btn");

      // Logout button handler
      document.getElementById("logout-btn-dashboard").onclick = () => signOut(auth);

      // Function to redirect to home with user ID
      window.redirectToHome = function() {
        if (auth.currentUser) {
          localStorage.setItem('currentUserId', auth.currentUser.uid);
          localStorage.setItem('currentUserName', auth.currentUser.displayName || 'User');
          localStorage.setItem('currentUserEmail', auth.currentUser.email);
        }
        window.location.href = "home.html";
      };

      /* Redirect if already logged in
      onAuthStateChanged(auth, (user) => {
        if (user) {
          window.location.href = "home.html";
        }
      }); */

      // Google sign-in
      document.getElementById("google-login-btn").onclick = async () => {
        try {
          clearError('login');
          await signInWithPopup(auth, provider);
        } catch (error) {
          console.error("Google sign-in error:", error);
          showError('login', 'Google sign-in failed. Please try again.');
        }
      };

      // Email sign-in
      loginBtn.addEventListener("click", async (e) => {
        e.preventDefault();
        const email = document.getElementById("login-email").value.trim();
        const pass = document.getElementById("login-password").value;
        if (!email || !pass) {
          showError('login', 'please enter email and password.');
          return;
        }

        clearError('login');
        loginBtnText.style.display = "none";
        loginLoader.style.display = "inline-block";

        try {
          const userCredential = await signInWithEmailAndPassword(auth, email, pass);
          // Update last login in Firestore
          await setDoc(doc(db, "users", userCredential.user.uid), {
            lastLogin: new Date(),
            ...getAdminSeed(userCredential.user),
          }, { merge: true });
        } catch (err) {
          console.error("Sign-in error", err);
          showError('login', 'sign-in failed. check your credentials and try again.');
          loginBtnText.style.display = "";
          loginLoader.style.display = "none";
        }
      });

      // Email sign-up
      signupBtn.addEventListener("click", async (e) => {
        e.preventDefault();
        const name = document.getElementById("signup-name").value.trim();
        const email = document.getElementById("signup-email").value.trim();
        const pass = document.getElementById("signup-password").value;
        if (!name || !email || !pass) {
          showError('signup', 'please fill all fields.');
          return;
        }

        clearError('signup');
        signupBtnText.style.display = "none";
        signupLoader.style.display = "inline-block";

        try {
          const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
          await updateProfile(userCredential.user, {
            displayName: name
          });
          
          // Save user data to Firestore
          await setDoc(doc(db, "users", userCredential.user.uid), {
            uid: userCredential.user.uid,
            displayName: name,
            email: email,
            createdAt: new Date(),
            lastLogin: new Date(),
            provider: "email",
            ...getAdminSeed(userCredential.user),
          });
          
          console.log("User data saved to Firestore");
          signupBtnText.style.display = "";
          signupLoader.style.display = "none";
        } catch (err) {
          console.error("Sign-up error", err);
          let errorMsg = 'Sign-up failed. Please try again.';
          if (err.code === 'auth/email-already-in-use') {
            errorMsg = 'Email already in use.';
          } else if (err.code === 'auth/weak-password') {
            errorMsg = 'Password should be at least 6 characters.';
          }
          showError('signup', errorMsg);
          signupBtnText.style.display = "";
          signupLoader.style.display = "none";
        }
      });

      // Inline error helpers
      function showError(form, message) {
        const el = document.getElementById(form + '-error');
        if (!el) { console.error('No error container for', form); return; }
        el.textContent = message;
        el.style.display = 'block';
        // auto-hide after 6s
        setTimeout(() => {
          if (el.textContent === message) el.style.display = 'none';
        }, 6000);
      }

      function clearError(form) {
        const el = document.getElementById(form + '-error');
        if (!el) return;
        el.textContent = '';
        el.style.display = 'none';
      }

      // Preserve visual/UX functions (stars, tabs, password toggle)
      const container = document.getElementById("star-container");
      const starCount = 60;
      const types = ["✦", "✧", "★", "⋆"];

      for (let i = 0; i < starCount; i++) {
        const star = document.createElement("div");
        star.className = "star";
        star.innerText = types[Math.floor(Math.random() * types.length)];
        star.style.top = Math.random() * 100 + "%";
        star.style.left = Math.random() * 100 + "%";
        star.style.fontSize = Math.random() * 0.9 + 0.5 + "rem";
        star.style.animationDelay = Math.random() * 5 + "s";
        star.style.animationDuration = 3 + Math.random() * 4 + "s";
        container.appendChild(star);
      }

      window.toggleForm = function (formType) {
        const loginForm = document.getElementById("login-form");
        const signupForm = document.getElementById("signup-form");
        const loginTab = document.getElementById("login-tab");
        const signupTab = document.getElementById("signup-tab");

        if (formType === "login") {
          loginForm.classList.add("active");
          signupForm.classList.remove("active");
          loginTab.classList.add("active");
          signupTab.classList.remove("active");
        } else {
          loginForm.classList.remove("active");
          signupForm.classList.add("active");
          loginTab.classList.remove("active");
          signupTab.classList.add("active");
        }
      };

      window.togglePassword = function (inputId, button) {
        const input = document.getElementById(inputId);
        if (input.type === "password") {
          input.type = "text";
          button.innerText = "🙈"; // Closed eyes doodle
        } else {
          input.type = "password";
          button.innerText = "👁"; // Open eye doodle
        }
      };

      // Track authentication state
      onAuthStateChanged(auth, async (user) => {
        if (user) {
          console.log("user id: " + auth.currentUser.uid);
          
          // Save or update user data in Firestore
          try {
            await setDoc(doc(db, "users", user.uid), {
              uid: user.uid,
              displayName: user.displayName || "User",
              email: user.email,
              photoURL: user.photoURL || null,
              lastLogin: new Date(),
              provider: user.providerData[0]?.providerId || "unknown",
              ...getAdminSeed(user),
            }, { merge: true }); // merge: true to update existing documents
            console.log("User data saved/updated in Firestore");
          } catch (error) {
            console.error("Error saving user data to Firestore:", error);
          }
          
          loginView.classList.add("hidden");
          dashboardView.classList.remove("hidden");
          document.getElementById("user-name").textContent = user.displayName || "User";
          document.getElementById("user-photo").src = user.photoURL || "https://via.placeholder.com/96";
        } else {
          loginView.classList.remove("hidden");
          dashboardView.classList.add("hidden");
        }
      });
    </script>
  </body>
</html>
